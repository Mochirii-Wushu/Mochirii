<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mōchirīī Recruitment • Where Winds Meet Guild</title>
  <meta name="description" content="A Mōchirīī recruitment note about joining through Discord, growing the guild with care, and keeping the hall warm." />
  <link rel="canonical" href="https://mochirii.com/recruitment.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Mōchirīī" />
  <meta property="og:title" content="Mōchirīī Recruitment • Where Winds Meet Guild" />
  <meta property="og:description" content="A Mōchirīī recruitment note about joining through Discord, growing the guild with care, and keeping the hall warm." />
  <meta property="og:url" content="https://mochirii.com/recruitment.html" />
  <meta property="og:image" content="https://mochirii.com/assets/img/recruitment/hero.webp" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mōchirīī Recruitment • Where Winds Meet Guild" />
  <meta name="twitter:description" content="A Mōchirīī recruitment note about joining through Discord, growing the guild with care, and keeping the hall warm." />
  <meta name="twitter:image" content="https://mochirii.com/assets/img/recruitment/hero.webp" />
  <meta name="theme-color" content="#0a0c0e" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="./assets/img/brand/apple-touch-icon.png" />

  <link rel="stylesheet" href="./styles.css" />
</head>

<body data-page="recruitment">
  <!-- Header -->
  <div id="header"></div>

  <!-- Background -->
  <div class="bg-photo" aria-hidden="true"></div>

  <!-- Hero -->
  <header class="page-hero-shell" aria-label="Recruitment hero">
    <div class="container">
      <section class="page-hero page-hero--tall">
        <img
          id="recruitmentHeroImage"
          src="./assets/img/recruitment/hero.webp"
          alt="Recruitment banner artwork"
          class="page-hero__img"
          width="1536"
          height="1024"
          loading="eager"
          decoding="async"
        />

        <img
          id="recruitmentAtmosphere"
          src=""
          alt=""
          class="page-hero__atmos"
          decoding="async"
          aria-hidden="true"
        />
      </section>
    </div>

    <div class="container hero-overlap">
      <section class="glass-card glass-card--strong glass-pad hero-intro center-stack">
        <p class="kicker" id="recruitmentKicker">Recruitment</p>

        <h1 class="display-title" id="recruitmentHeading">Recruitment & Membership</h1>

        <div class="meta-row" aria-label="Recruitment metadata">
          <span class="meta-text" id="recruitmentAuthor"></span>
          <span class="meta-dot" aria-hidden="true">•</span>
          <span class="meta-text" id="recruitmentUpdated"></span>
        </div>

        <p class="lede" id="recruitmentIntro">Loading…</p>

        <div class="badge-row" id="recruitmentBadges" aria-label="Recruitment tags"></div>

        <p id="recruitmentError" class="sr-only" role="status" aria-live="polite"></p>
      </section>
    </div>
  </header>

  <!-- Main -->
  <main class="page-main" id="main">
    <div class="container">
      <div class="grid-12 grid-gap">

        <!-- Audio note -->
        <section class="col-4" aria-describedby="recruitmentAudioDesc">
          <div class="glass-card glass-card--soft glass-pad center-stack">
            <h2 class="section-title section-title--sm" id="recruitmentAudioTitle">A Note</h2>
            <p class="muted" id="recruitmentAudioDesc">Loading…</p>

            <div class="recruitment-audio-shell u-full-width u-mt-12">
              <audio
                id="recruitmentAudio"
                preload="none"
                class="recruitment-audio-native"
                aria-labelledby="recruitmentAudioTitle"
                aria-describedby="recruitmentAudioDesc"
                controlslist="nodownload"
              >
                <!-- sources inserted by recruitment.js -->
                Your browser does not support the audio element.
              </audio>

              <div
                id="recruitmentAudioPlayer"
                class="recruitment-audio-player"
                data-custom-recruitment-audio-player="true"
                data-state="paused"
                aria-describedby="recruitmentAudioDesc"
                style="--audio-progress:0%; --audio-volume:100%;"
              >
                <button
                  class="recruitment-audio-button recruitment-audio-button--play"
                  type="button"
                  data-audio-play
                  aria-label="Play recruitment audio"
                >
                  <span class="recruitment-audio-button__icon" data-icon="play" aria-hidden="true"></span>
                </button>

                <label class="recruitment-audio-progress-wrap">
                  <span class="sr-only">Seek recruitment audio</span>
                  <input
                    class="recruitment-audio-progress"
                    type="range"
                    min="0"
                    max="0"
                    step="0.1"
                    value="0"
                    data-audio-seek
                    aria-label="Seek recruitment audio"
                    aria-valuetext="0:00 of 0:00"
                    disabled
                  />
                </label>

                <span class="recruitment-audio-time" data-audio-time aria-live="off">0:00 / 0:00</span>

                <button
                  class="recruitment-audio-button recruitment-audio-button--mute"
                  type="button"
                  data-audio-mute
                  data-muted="false"
                  aria-label="Mute recruitment audio"
                >
                  Vol
                </button>

                <label class="recruitment-audio-volume-wrap">
                  <span class="sr-only">Recruitment audio volume</span>
                  <input
                    class="recruitment-audio-volume"
                    type="range"
                    min="0"
                    max="1"
                    step="0.05"
                    value="1"
                    data-audio-volume
                    aria-label="Recruitment audio volume"
                    aria-valuetext="100%"
                  />
                </label>

                <p class="sr-only" role="status" aria-live="polite" data-audio-status></p>
              </div>
            </div>

            <div class="badge-row" id="recruitmentAudioBadges" aria-label="Audio formats"></div>
          </div>
        </section>

        <!-- Body -->
        <section class="col-8">
          <div class="glass-card glass-card--primary glass-pad">
            <h2 class="section-title" id="recruitmentBodyTitle">Recruitment</h2>

            <div id="recruitmentBody" class="prose-stack">
              <p class="muted">Loading…</p>
            </div>

            <div id="recruitmentConclusion" class="prose-stack" style="margin-top:18px;"></div>
          </div>
        </section>

        <div class="col-divider" aria-hidden="true"></div>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="./utils.js" defer></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="./supabase.js" defer></script>
  <script src="./site.js" defer></script>
  <script src="./recruitment.js" defer></script>
</body>
</html>
