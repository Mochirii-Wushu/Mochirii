services:
## MariaDB and Redis (optional)
  db:
    image: mariadb:11.4@sha256:a794d9eb009e20de605858a11f32f63b4075cbd197c650436f0e3b457e4caed7
    container_name: pixelfed-db
    restart: unless-stopped
    env_file:
      - ${PIXELFED_ENV_FILE:-.env}
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      # Keep the legacy host path so existing installations retain their data.
      - ./mysql-9-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mariadb-admin ping -h 127.0.0.1 -u root -p$$MARIADB_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - pixelfed-network

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: pixelfed-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - ./redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - pixelfed-network

## Pixelfed containers - App (Web/API), Horizon Queue, Scheduled task.
  pixelfed:
    image: ${PIXELFED_IMAGE:-mochirii-pixelfed:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelfed-app
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ${PIXELFED_ENV_FILE:-.env}
    environment:
      # SSL Configuration (handled by reverse proxy)
      SSL_MODE: "off"

      # PHP Configuration
      MAX_PHOTO_SIZE: "92160"
      MAX_AVATAR_SIZE: "92160"
      PHP_POST_MAX_SIZE: "100M"
      PHP_UPLOAD_MAX_FILE_SIZE: "95M"
      PHP_OPCACHE_ENABLE: "1"

      # Laravel Auto-run Configuration
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION: "true"
      AUTORUN_LARAVEL_MIGRATION_ISOLATION: "true"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "true"
      AUTORUN_LARAVEL_ROUTE_CACHE: "true"
      AUTORUN_LARAVEL_VIEW_CACHE: "true"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"

    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pixelfed-network

  horizon:
    image: ${PIXELFED_IMAGE:-mochirii-pixelfed:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelfed-horizon
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    env_file:
      - ${PIXELFED_ENV_FILE:-.env}
    environment:
      # Laravel Auto-run Configuration
      AUTORUN_ENABLED: "false"
      AUTORUN_LARAVEL_MIGRATION: "false"
      AUTORUN_LARAVEL_MIGRATION_ISOLATION: "false"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "false"
      AUTORUN_LARAVEL_ROUTE_CACHE: "false"
      AUTORUN_LARAVEL_VIEW_CACHE: "false"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
      MAX_PHOTO_SIZE: "92160"
      MAX_AVATAR_SIZE: "92160"
      PHP_POST_MAX_SIZE: "100M"
      PHP_UPLOAD_MAX_FILE_SIZE: "95M"
      PHP_OPCACHE_ENABLE: "1"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - pixelfed-network

  scheduler:
    image: ${PIXELFED_IMAGE:-mochirii-pixelfed:local}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pixelfed-scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    stop_signal: SIGTERM
    env_file:
      - ${PIXELFED_ENV_FILE:-.env}
    environment:
      # Laravel Auto-run Configuration
      AUTORUN_ENABLED: "false"
      AUTORUN_LARAVEL_MIGRATION: "false"
      AUTORUN_LARAVEL_MIGRATION_ISOLATION: "false"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "false"
      AUTORUN_LARAVEL_ROUTE_CACHE: "false"
      AUTORUN_LARAVEL_VIEW_CACHE: "false"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
      MAX_PHOTO_SIZE: "92160"
      MAX_AVATAR_SIZE: "92160"
      PHP_POST_MAX_SIZE: "100M"
      PHP_UPLOAD_MAX_FILE_SIZE: "95M"
      PHP_OPCACHE_ENABLE: "1"
    volumes:
      - ./storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck-schedule"]
      start_period: 10s
    networks:
      - pixelfed-network

networks:
  pixelfed-network:
    driver: bridge
