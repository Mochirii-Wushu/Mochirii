name: mochirii-social

x-app-image: &app-image ${PIXELFED_IMAGE:?PIXELFED_IMAGE must be an immutable GHCR digest}
x-app-env: &app-env
  env_file:
    - ${PIXELFED_ENV_FILE:?PIXELFED_ENV_FILE must point to the root-owned runtime environment}
  pull_policy: never

services:
  db:
    image: mariadb:11.4@sha256:a794d9eb009e20de605858a11f32f63b4075cbd197c650436f0e3b457e4caed7
    container_name: pixelfed-db
    restart: unless-stopped
    env_file:
      - ${PIXELFED_ENV_FILE:?PIXELFED_ENV_FILE must point to the root-owned runtime environment}
    environment:
      MARIADB_DATABASE: ${DB_DATABASE}
      MARIADB_USER: ${DB_USERNAME}
      MARIADB_PASSWORD: ${DB_PASSWORD}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - ${PIXELFED_DATA_ROOT:?PIXELFED_DATA_ROOT must be an absolute path}/mariadb:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "MYSQL_PWD=$$MARIADB_PASSWORD mariadb-admin ping -h 127.0.0.1 -u $$MARIADB_USER --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - pixelfed-network

  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: pixelfed-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - ${PIXELFED_DATA_ROOT:?PIXELFED_DATA_ROOT must be an absolute path}/redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks:
      - pixelfed-network

  pixelfed:
    <<: *app-env
    image: *app-image
    container_name: pixelfed-app
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      SSL_MODE: "off"
      MAX_PHOTO_SIZE: "92160"
      MAX_AVATAR_SIZE: "92160"
      PHP_POST_MAX_SIZE: "100M"
      PHP_UPLOAD_MAX_FILE_SIZE: "95M"
      PHP_OPCACHE_ENABLE: "1"
      AUTORUN_ENABLED: "true"
      AUTORUN_LARAVEL_MIGRATION: "false"
      AUTORUN_LARAVEL_MIGRATION_ISOLATION: "true"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "true"
      AUTORUN_LARAVEL_ROUTE_CACHE: "true"
      AUTORUN_LARAVEL_VIEW_CACHE: "true"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
    volumes:
      - ${PIXELFED_DATA_ROOT:?PIXELFED_DATA_ROOT must be an absolute path}/storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - pixelfed-network

  horizon:
    <<: *app-env
    image: *app-image
    container_name: pixelfed-horizon
    restart: unless-stopped
    command: ["php", "artisan", "horizon"]
    environment:
      AUTORUN_ENABLED: "false"
      AUTORUN_LARAVEL_MIGRATION: "false"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "false"
      AUTORUN_LARAVEL_ROUTE_CACHE: "false"
      AUTORUN_LARAVEL_VIEW_CACHE: "false"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
      MAX_PHOTO_SIZE: "92160"
      MAX_AVATAR_SIZE: "92160"
      PHP_POST_MAX_SIZE: "100M"
      PHP_UPLOAD_MAX_FILE_SIZE: "95M"
      PHP_OPCACHE_ENABLE: "1"
    volumes:
      - ${PIXELFED_DATA_ROOT:?PIXELFED_DATA_ROOT must be an absolute path}/storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "php", "artisan", "horizon:status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pixelfed-network

  scheduler:
    <<: *app-env
    image: *app-image
    container_name: pixelfed-scheduler
    restart: unless-stopped
    command: ["php", "artisan", "schedule:work"]
    stop_signal: SIGTERM
    environment:
      AUTORUN_ENABLED: "false"
      AUTORUN_LARAVEL_MIGRATION: "false"
      AUTORUN_LARAVEL_STORAGE_LINK: "true"
      AUTORUN_LARAVEL_EVENT_CACHE: "false"
      AUTORUN_LARAVEL_ROUTE_CACHE: "false"
      AUTORUN_LARAVEL_VIEW_CACHE: "false"
      AUTORUN_LARAVEL_CONFIG_CACHE: "true"
      MAX_PHOTO_SIZE: "92160"
      MAX_AVATAR_SIZE: "92160"
      PHP_POST_MAX_SIZE: "100M"
      PHP_UPLOAD_MAX_FILE_SIZE: "95M"
      PHP_OPCACHE_ENABLE: "1"
    volumes:
      - ${PIXELFED_DATA_ROOT:?PIXELFED_DATA_ROOT must be an absolute path}/storage:/var/www/html/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "healthcheck-schedule"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - pixelfed-network

networks:
  pixelfed-network:
    driver: bridge
