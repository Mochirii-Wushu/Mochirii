<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Mōchirīī Gallery • Where Winds Meet Guild</title>
  <meta name="description" content="Screenshots from Mōchirīī runs, quiet roads, guild gatherings, and small Where Winds Meet moments worth keeping." />
  <link rel="canonical" href="https://mochirii.com/gallery.html" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Mōchirīī" />
  <meta property="og:title" content="Mōchirīī Gallery • Where Winds Meet Guild" />
  <meta property="og:description" content="Screenshots from Mōchirīī runs, quiet roads, guild gatherings, and small Where Winds Meet moments worth keeping." />
  <meta property="og:url" content="https://mochirii.com/gallery.html" />
  <meta property="og:image" content="https://mochirii.com/assets/img/gallery/hero.webp" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Mōchirīī Gallery • Where Winds Meet Guild" />
  <meta name="twitter:description" content="Screenshots from Mōchirīī runs, quiet roads, guild gatherings, and small Where Winds Meet moments worth keeping." />
  <meta name="twitter:image" content="https://mochirii.com/assets/img/gallery/hero.webp" />
  <meta name="theme-color" content="#0a0c0e" />
  <link rel="icon" href="./favicon.ico" sizes="any" />
  <link rel="apple-touch-icon" href="./assets/img/brand/apple-touch-icon.png" />
  <link rel="stylesheet" href="./styles.css" />
</head>

<body data-page="gallery">
  <!-- Header -->
  <div id="header"></div>

  <!-- Background -->
  <div class="bg-photo" aria-hidden="true"></div>

  <!-- Hero -->
  <header class="page-hero-shell" aria-label="Gallery hero">
    <div class="container">
      <section class="page-hero page-hero--tall">
        <img
          id="galleryHeroImage"
          src="./assets/img/gallery/hero.webp"
          alt="Gallery banner artwork"
          class="page-hero__img"
          width="1536"
          height="1024"
          loading="eager"
          decoding="async"
        />

        <img
          id="galleryAtmosphere"
          src=""
          alt=""
          class="page-hero__atmos"
          decoding="async"
          aria-hidden="true"
        />
      </section>
    </div>

    <div class="container hero-overlap">
      <section class="glass-card glass-card--strong glass-pad hero-intro center-stack">
        <p class="kicker">Gallery</p>

     <h1 class="display-title" id="galleryTitle">Guild Album</h1>

     <p class="lede" id="galleryDesc">
       Shared runs, quiet roads, and little guild moments worth keeping.
     </p>

        <div class="badge-row" aria-label="Gallery tips">
          <span>Tip: click any image to view it full size.</span>
        </div>
      </section>
    </div>
  </header>

  <!-- Main -->
  <main class="page-main" id="main">
    <div class="container">
      <section class="glass-card glass-card--primary glass-pad center-stack">
        <h2 class="section-title">Gallery</h2>

        <p class="muted" id="galleryIntro">
          Send screenshots to the Discord gallery channel when a run, view, or tiny guild moment feels worth saving.
        </p>

        <div class="gallery-toolbar" aria-label="Gallery browsing">
          <div class="gallery-controls">
            <div id="galleryFilters" class="gallery-filters" aria-label="Gallery categories"></div>
            <button id="galleryCopyLink" class="gallery-copy-link" type="button">Copy link</button>
          </div>
          <p id="galleryShareStatus" class="gallery-share-status muted" role="status" aria-live="polite" aria-atomic="true"></p>
          <p id="galleryCount" class="gallery-count muted" role="status" aria-live="polite"></p>
        </div>

        <p id="galleryEmpty" class="gallery-empty" role="status" hidden>
          No images in this category yet.
        </p>

        <!-- Grid mount (gallery.js renders items here from gallery.json) -->
        <div id="galleryGrid" class="gallery-grid" aria-live="polite">
          <!-- populated by gallery.js -->
        </div>

        <p id="galleryError" class="sr-only" role="status" aria-live="polite"></p>
      </section>
    </div>
  </main>

  <!-- Lightbox (site.js controls this) -->
  <div
    id="lightbox"
    class="lightbox hidden"
    aria-hidden="true"
    role="dialog"
    aria-modal="true"
    aria-label="Image viewer"
  >
    <div id="lightboxBackdrop" class="lightbox-backdrop" data-close></div>

    <div class="lightbox-shell" role="document">
      <button
        id="lightboxClose"
        class="lightbox-close"
        type="button"
        data-close
        aria-label="Close viewer"
      >
        ✕
      </button>

      <figure class="lightbox-card">
        <img
          id="lightboxImg"
          src=""
          alt=""
          class="lightbox-img"
          decoding="async"
        />
        <figcaption
          id="lightboxCaption"
          class="lightbox-caption"
        ></figcaption>
      </figure>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script src="./utils.js" defer></script>
  <script src="./site.js" defer></script>
  <script src="./gallery.js" defer></script>
</body>
</html>
