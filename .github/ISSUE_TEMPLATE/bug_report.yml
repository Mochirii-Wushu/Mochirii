name: Bug report
description: Report a site or workflow bug.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL or route
      description: Include the page, route, or workflow where the issue appears.
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the shortest reliable reproduction steps.
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
  - type: dropdown
    id: surface
    attributes:
      label: Surface
      options:
        - Root GitHub Pages site
        - Next/Vercel app
        - Supabase/auth/member workflow
        - Unknown

