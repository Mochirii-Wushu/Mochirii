name: Production smoke check

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run production smoke check
        run: npm run check:production
