name: Production smoke check

on:
  workflow_dispatch:
  schedule:
    - cron: "30 9 * * 1"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run production metadata smoke
        run: npm run check:production

      - name: Run Vercel production route smoke
        run: npm run smoke:vercel-production -- --base-url=https://mochirii.com

      - name: Run Supabase Edge contract smoke
        run: npm run smoke:supabase-edge-functions

      - name: Run custom-domain DNS smoke
        run: npm run smoke:dns-cutover-post -- --base-url=https://mochirii.com --www-mode=redirect
