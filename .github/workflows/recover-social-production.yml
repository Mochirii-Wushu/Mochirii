name: Verify or restore Mochirii Social backup

on:
  workflow_dispatch:
    inputs:
      object_key:
        description: Exact private backup object key
        required: true
        type: string
      mode:
        description: Validate in isolation, or restore production
        required: true
        default: validate-only
        type: choice
        options:
          - validate-only
          - restore-production
      confirmation:
        description: Type VERIFY social backup or RESTORE social.mochirii.com
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: social-recovery
  cancel-in-progress: false

jobs:
  recover:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: social-recovery
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate recovery inputs
        env:
          OBJECT_KEY: ${{ inputs.object_key }}
          RECOVERY_MODE: ${{ inputs.mode }}
          CONFIRMATION: ${{ inputs.confirmation }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ "$OBJECT_KEY" =~ ^(daily|weekly|monthly|manual)/[0-9]{8}T[0-9]{6}Z-[A-Za-z0-9._-]+[.]tar[.]age$ ]]
          if [[ "$RECOVERY_MODE" == "validate-only" ]]; then
            [[ "$CONFIRMATION" == "VERIFY social backup" ]]
          else
            [[ "$RECOVERY_MODE" == "restore-production" ]]
            [[ "$CONFIRMATION" == "RESTORE social.mochirii.com" ]]
          fi

      - name: Install recovery tools
        shell: bash
        run: |
          set -Eeuo pipefail
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends age rclone

      - name: Configure private recovery inputs
        env:
          BACKUP_AGE_IDENTITY: ${{ secrets.BACKUP_AGE_IDENTITY }}
          BACKUP_S3_ACCESS_KEY_ID: ${{ secrets.BACKUP_S3_ACCESS_KEY_ID }}
          BACKUP_S3_SECRET_ACCESS_KEY: ${{ secrets.BACKUP_S3_SECRET_ACCESS_KEY }}
          BACKUP_S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
          BACKUP_S3_ENDPOINT: ${{ vars.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_REGION: ${{ vars.BACKUP_S3_REGION }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "$BACKUP_AGE_IDENTITY" ]]
          [[ "$BACKUP_S3_BUCKET" =~ ^[a-z0-9][a-z0-9.-]{1,61}[a-z0-9]$ ]]
          [[ "$BACKUP_S3_ENDPOINT" =~ ^https://[a-z0-9-]+[.]digitaloceanspaces[.]com$ ]]
          install -d -m 0700 recovery
          printf '%s\n' "$BACKUP_AGE_IDENTITY" | tr -d '\r' > recovery/identity
          chmod 0600 recovery/identity
          {
            printf 'RCLONE_CONFIG_MOCHIRII_BACKUP_TYPE=s3\n'
            printf 'RCLONE_CONFIG_MOCHIRII_BACKUP_PROVIDER=DigitalOcean\n'
            printf 'RCLONE_CONFIG_MOCHIRII_BACKUP_ENV_AUTH=false\n'
            printf 'RCLONE_CONFIG_MOCHIRII_BACKUP_ACCESS_KEY_ID=%s\n' "$BACKUP_S3_ACCESS_KEY_ID"
            printf '%s=%s\n' 'RCLONE_CONFIG_MOCHIRII_BACKUP_SECRET_ACCESS_KEY' "$BACKUP_S3_SECRET_ACCESS_KEY"
            printf 'RCLONE_CONFIG_MOCHIRII_BACKUP_ENDPOINT=%s\n' "$BACKUP_S3_ENDPOINT"
            printf 'RCLONE_CONFIG_MOCHIRII_BACKUP_REGION=%s\n' "$BACKUP_S3_REGION"
          } >> "$GITHUB_ENV"

      - name: Download and decrypt recovery point
        env:
          OBJECT_KEY: ${{ inputs.object_key }}
          BACKUP_S3_BUCKET: ${{ vars.BACKUP_S3_BUCKET }}
        shell: bash
        run: |
          set -Eeuo pipefail
          rclone --config /dev/null --quiet copyto --s3-no-check-bucket \
            "MOCHIRII_BACKUP:$BACKUP_S3_BUCKET/$OBJECT_KEY" \
            recovery/recovery.tar.age
          age --decrypt --identity recovery/identity \
            --output recovery/recovery.tar recovery/recovery.tar.age

      - name: Validate payload and isolated restore
        shell: bash
        run: |
          set -Eeuo pipefail
          mapfile -t entries < <(tar -tf recovery/recovery.tar)
          expected=(database.sql.gz configuration.tar.gz manifest)
          [[ "${#entries[@]}" -eq "${#expected[@]}" ]]
          for name in "${expected[@]}"; do
            printf '%s\n' "${entries[@]}" | grep -Fxq "$name"
          done
          tar -xf recovery/recovery.tar --no-same-owner --no-same-permissions -C recovery
          gzip -t recovery/database.sql.gz
          grep -Fxq 'format=1' recovery/manifest
          grep -Eq '^release_commit=[0-9a-f]{40}$' recovery/manifest
          grep -Eq '^release_digest=sha256:[0-9a-f]{64}$' recovery/manifest

          restore_password="$(od -An -N32 -tx1 /dev/urandom | tr -d ' \n')"
          docker run --detach --rm --name mochirii-recovery-verify \
            --network none \
            --tmpfs /var/lib/mysql:rw,noexec,nosuid,size=640m \
            --env MARIADB_DATABASE=restore_check \
            --env MARIADB_ROOT_PASSWORD="$restore_password" \
            mariadb:11.4@sha256:a794d9eb009e20de605858a11f32f63b4075cbd197c650436f0e3b457e4caed7 \
            >/dev/null
          trap 'docker rm --force mochirii-recovery-verify >/dev/null 2>&1 || true' EXIT

          restore_ready=false
          for _ in {1..60}; do
            if docker exec --env MYSQL_PWD="$restore_password" \
              mochirii-recovery-verify mariadb --user=root --batch \
              --skip-column-names --execute='SELECT 1;' >/dev/null 2>&1; then
              restore_ready=true
              break
            fi
            sleep 2
          done
          [[ "$restore_ready" == true ]] || {
            echo "The isolated restore database did not become ready." >&2
            exit 1
          }
          gzip -dc recovery/database.sql.gz | docker exec --interactive \
            --env MYSQL_PWD="$restore_password" mochirii-recovery-verify \
            mariadb --user=root restore_check
          for table_name in users statuses media oauth_clients; do
            docker exec --env MYSQL_PWD="$restore_password" \
              mochirii-recovery-verify mariadb --user=root --batch \
              --skip-column-names restore_check \
              --execute="SELECT COUNT(*) FROM \`$table_name\`;" >/dev/null
          done

      - name: Configure restricted recovery SSH
        if: inputs.mode == 'restore-production'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SOCIAL_RECOVERY_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SOCIAL_RECOVERY_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -Eeuo pipefail
          install -d -m 0700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/social_recovery_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/social_recovery_key ~/.ssh/known_hosts

      - name: Restore production database
        if: inputs.mode == 'restore-production'
        env:
          RECOVERY_HOST: ${{ vars.SOCIAL_RECOVERY_HOST }}
          RECOVERY_USER: ${{ vars.SOCIAL_RECOVERY_USER }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "$RECOVERY_HOST" && -n "$RECOVERY_USER" ]]
          ssh \
            -i ~/.ssh/social_recovery_key \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$RECOVERY_USER@$RECOVERY_HOST" \
            'restore RESTORE_social.mochirii.com' \
            < recovery/recovery.tar

      - name: Clean up recovery material
        if: always()
        shell: bash
        run: |
          docker rm --force mochirii-recovery-verify >/dev/null 2>&1 || true
          rm -rf recovery ~/.ssh/social_recovery_key
