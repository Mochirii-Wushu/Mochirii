name: Manual Lighthouse audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse audits
        run: |
          set -euo pipefail
          mkdir -p reports/lighthouse

          npx lighthouse "https://mochirii.com/" \
            --output=html --output=json \
            --output-path=reports/lighthouse/home \
            --chrome-flags="--headless --no-sandbox"

          npx lighthouse "https://mochirii.com/recruitment" \
            --output=html --output=json \
            --output-path=reports/lighthouse/recruitment \
            --chrome-flags="--headless --no-sandbox"

          npx lighthouse "https://mochirii.com/gallery" \
            --output=html --output=json \
            --output-path=reports/lighthouse/gallery \
            --chrome-flags="--headless --no-sandbox"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: lighthouse-reports
          path: reports/lighthouse/
