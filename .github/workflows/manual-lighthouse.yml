name: Manual Lighthouse audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Run Lighthouse audits
        run: |
          set -euo pipefail
          node scripts/run-lighthouse-route-matrix.mjs --base-url=https://mochirii.com --out-dir=reports/lighthouse

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: reports/lighthouse/
