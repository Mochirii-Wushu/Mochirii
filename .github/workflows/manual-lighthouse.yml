name: Manual Lighthouse audit

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run Lighthouse audits
        run: |
          set -euo pipefail
          mkdir -p reports/lighthouse

          npx lighthouse "https://mochirii.com/" \
            --output=html --output=json \
            --output-path=reports/lighthouse/home \
            --chrome-flags="--headless --no-sandbox"

          npx lighthouse "https://mochirii.com/recruitment" \
            --output=html --output=json \
            --output-path=reports/lighthouse/recruitment \
            --chrome-flags="--headless --no-sandbox"

          npx lighthouse "https://mochirii.com/gallery" \
            --output=html --output=json \
            --output-path=reports/lighthouse/gallery \
            --chrome-flags="--headless --no-sandbox"

      - name: Upload Lighthouse reports
        uses: actions/upload-artifact@v7
        with:
          name: lighthouse-reports
          path: reports/lighthouse/
