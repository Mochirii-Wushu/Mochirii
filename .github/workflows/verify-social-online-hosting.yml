name: Verify Mochirii online hosting

on:
  workflow_dispatch:
    inputs:
      confirmation:
        description: Type VERIFY social.mochirii.com
        required: true
        type: string

permissions:
  contents: read

concurrency:
  group: social-production-verification
  cancel-in-progress: false

jobs:
  verify:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: social-production
    timeout-minutes: 10

    steps:
      - name: Validate confirmation
        env:
          VERIFY_CONFIRMATION: ${{ inputs.confirmation }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ "$VERIFY_CONFIRMATION" == "VERIFY social.mochirii.com" ]]

      - name: Configure restricted SSH client
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SOCIAL_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SOCIAL_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -Eeuo pipefail
          install -d -m 0700 ~/.ssh
          install -m 0600 /dev/null ~/.ssh/social_deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/social_deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts

      - name: Verify Social runtime and Spaces
        env:
          DEPLOY_HOST: ${{ vars.SOCIAL_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.SOCIAL_DEPLOY_USER }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "$DEPLOY_HOST" && -n "$DEPLOY_USER" ]]
          ssh \
            -i ~/.ssh/social_deploy_key \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "verify VERIFY_social.mochirii.com"

      - name: Verify hosted public boundaries
        shell: bash
        run: |
          set -Eeuo pipefail
          expect_status() {
            local label="$1"
            local expected="$2"
            local method="$3"
            local url="$4"
            local body="${5:-}"
            local response_file
            local status
            response_file="$(mktemp)"
            if [[ -n "$body" ]]; then
              status="$(curl --silent --show-error --max-time 30 \
                --request "$method" --header 'Content-Type: application/json' \
                --data "$body" --output "$response_file" \
                --write-out '%{http_code}' "$url")"
            else
              status="$(curl --silent --show-error --max-time 30 \
                --request "$method" --output "$response_file" \
                --write-out '%{http_code}' "$url")"
            fi
            [[ "$status" == "$expected" ]] || {
              echo "$label returned HTTP $status; expected $expected." >&2
              rm -f "$response_file"
              return 1
            }
            rm -f "$response_file"
            echo "$label passed with HTTP $status."
          }

          expect_social_edge() {
            local headers
            local status
            headers="$(mktemp)"
            status="$(curl --silent --show-error --location --max-time 30 \
              --dump-header "$headers" --output /dev/null \
              --write-out '%{http_code}' https://social.mochirii.com/)"
            case "$status" in
              2?? | 3??) echo "Social passed with HTTP $status." ;;
              403) echo "Cloudflare blocked the GitHub runner after the forced hosted public gate passed." ;;
              *)
                echo "Social returned unexpected HTTP $status." >&2
                rm -f "$headers"
                return 1
                ;;
            esac
            rm -f "$headers"
          }

          expect_status "Website" 200 GET "https://mochirii.com/"
          expect_social_edge
          expect_status "Supabase Auth boundary" 401 GET \
            "https://deyvmtncimmcinldjyqe.supabase.co/auth/v1/health"
          expect_status "Reaper interactions unsigned boundary" 401 POST \
            "https://deyvmtncimmcinldjyqe.supabase.co/functions/v1/reaper-discord-interactions" \
            '{"type":1}'
          expect_status "Reaper member-sync unsigned boundary" 401 POST \
            "https://deyvmtncimmcinldjyqe.supabase.co/functions/v1/reaper-discord-member-sync" \
            '{}'
          expect_status "Member-access unsigned boundary" 401 POST \
            "https://deyvmtncimmcinldjyqe.supabase.co/functions/v1/verify-member-access" \
            '{}'
          expect_status "Discord API gateway" 200 GET \
            "https://discord.com/api/v10/gateway"

      - name: Clean up SSH material
        if: always()
        shell: bash
        run: rm -f ~/.ssh/social_deploy_key
