name: Validate Shopify theme

on:
  pull_request:
    paths:
      - "apps/shopify-theme/**"
      - "scripts/check-brand-boundaries.mjs"
      - ".github/workflows/validate-shopify-theme.yml"
  push:
    branches:
      - main
    paths:
      - "apps/shopify-theme/**"
      - "scripts/check-brand-boundaries.mjs"
      - ".github/workflows/validate-shopify-theme.yml"

permissions:
  contents: read

jobs:
  validate-theme:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/shopify-theme

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/shopify-theme/package-lock.json

      - name: Install locked dependencies
        run: npm ci

      - name: Validate theme and repository boundaries
        run: npm run check

      - name: Package theme without publishing
        run: npm run theme:package
