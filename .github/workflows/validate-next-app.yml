name: Validate Next app

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-next:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .node-version
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check local toolchain contract
        run: npm run toolchain:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Check client bundle budgets
        run: npm run check:client-bundle

      - name: Check local font bundle
        run: npm run check:font-bundle

      - name: Check route CSS delivery
        run: npm run check:route-css-bundle
