name: Validate Next app

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate-next:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check local toolchain contract
        run: npm run toolchain:check

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
