name: Deploy Mochirii Social production

on:
  workflow_dispatch:
    inputs:
      commit:
        description: Full canonical main commit SHA
        required: true
        type: string
      image_digest:
        description: Published GHCR sha256 digest for the commit
        required: true
        type: string
      confirmation:
        description: Type DEPLOY social.mochirii.com
        required: true
        type: string
      migration_approval:
        description: Use NONE, or MIGRATIONS APPROVED after backup review
        required: true
        default: NONE
        type: choice
        options:
          - NONE
          - MIGRATIONS APPROVED

permissions:
  contents: read

concurrency:
  group: social-production
  cancel-in-progress: false

env:
  REGISTRY_IMAGE: ghcr.io/mochirii-wushu/mochirii-pixelfed-ops

jobs:
  deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment: social-production
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release inputs
        id: release
        env:
          RELEASE_COMMIT: ${{ inputs.commit }}
          RELEASE_DIGEST: ${{ inputs.image_digest }}
          RELEASE_CONFIRMATION: ${{ inputs.confirmation }}
          MIGRATION_APPROVAL: ${{ inputs.migration_approval }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ "$RELEASE_COMMIT" =~ ^[0-9a-f]{40}$ ]]
          [[ "$RELEASE_DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]
          [[ "$RELEASE_CONFIRMATION" == "DEPLOY social.mochirii.com" ]]
          [[ "$MIGRATION_APPROVAL" == "NONE" || "$MIGRATION_APPROVAL" == "MIGRATIONS APPROVED" ]]
          git cat-file -e "$RELEASE_COMMIT^{commit}"
          git merge-base --is-ancestor "$RELEASE_COMMIT" origin/main

          migration_token="${MIGRATION_APPROVAL// /_}"
          {
            echo "commit=$RELEASE_COMMIT"
            echo "digest=$RELEASE_DIGEST"
            echo "migration_token=$migration_token"
          } >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: printf '%s' "$GHCR_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Verify published commit digest
        env:
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
          RELEASE_DIGEST: ${{ steps.release.outputs.digest }}
        shell: bash
        run: |
          set -Eeuo pipefail
          published_digest="$(
            docker buildx imagetools inspect "$REGISTRY_IMAGE:$RELEASE_COMMIT" |
              awk '/^Digest:/ { print $2; exit }'
          )"
          [[ "$published_digest" == "$RELEASE_DIGEST" ]]

      - name: Build no-secret release bundle
        env:
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
          RELEASE_DIGEST: ${{ steps.release.outputs.digest }}
        shell: bash
        run: |
          set -Eeuo pipefail
          install -d -m 0700 release-bundle
          install -m 0644 \
            services/social/docker-compose.production.yml \
            release-bundle/docker-compose.production.yml
          {
            printf 'commit=%s\n' "$RELEASE_COMMIT"
            printf 'digest=%s\n' "$RELEASE_DIGEST"
            printf '%s\n' 'repository=Mochirii-Wushu/Mochirii'
          } > release-bundle/release.meta
          tar -czf release-bundle.tar.gz -C release-bundle \
            docker-compose.production.yml release.meta

      - name: Configure restricted SSH client
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SOCIAL_SSH_PRIVATE_KEY }}
          SSH_KNOWN_HOSTS: ${{ secrets.SOCIAL_SSH_KNOWN_HOSTS }}
        shell: bash
        run: |
          set -Eeuo pipefail
          install -d -m 0700 ~/.ssh
          install -m 0600 /dev/null ~/.ssh/social_deploy_key
          printf '%s\n' "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/social_deploy_key
          printf '%s\n' "$SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 0600 ~/.ssh/known_hosts

      - name: Deploy immutable release
        env:
          RELEASE_COMMIT: ${{ steps.release.outputs.commit }}
          RELEASE_DIGEST: ${{ steps.release.outputs.digest }}
          MIGRATION_TOKEN: ${{ steps.release.outputs.migration_token }}
          DEPLOY_HOST: ${{ vars.SOCIAL_DEPLOY_HOST }}
          DEPLOY_USER: ${{ vars.SOCIAL_DEPLOY_USER }}
        shell: bash
        run: |
          set -Eeuo pipefail
          [[ -n "$DEPLOY_HOST" && -n "$DEPLOY_USER" ]]
          ssh \
            -i ~/.ssh/social_deploy_key \
            -o BatchMode=yes \
            -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=yes \
            -o UserKnownHostsFile=~/.ssh/known_hosts \
            "$DEPLOY_USER@$DEPLOY_HOST" \
            "deploy $RELEASE_COMMIT $RELEASE_DIGEST DEPLOY_social.mochirii.com $MIGRATION_TOKEN" \
            < release-bundle.tar.gz

      - name: Verify public edge
        shell: bash
        run: |
          set -Eeuo pipefail
          headers="$(mktemp)"
          trap 'rm -f "$headers"' EXIT
          status="$(
            curl --silent --show-error --location --retry 6 --retry-all-errors \
              --retry-delay 5 --max-time 30 --dump-header "$headers" \
              --output /dev/null --write-out '%{http_code}' \
              https://social.mochirii.com/
          )"
          case "$status" in
            2?? | 3??) ;;
            403)
              if grep -Eiq '^cf-mitigated:[[:space:]]*challenge\r?$' "$headers"; then
                echo "Cloudflare challenged the GitHub runner after hosted runtime verification passed."
              elif grep -Eiq '^server:[[:space:]]*cloudflare\r?$' "$headers"; then
                echo "Cloudflare blocked the GitHub runner after hosted runtime verification passed."
              else
                echo "The public edge blocked the GitHub runner after the hosted public health gates passed."
              fi
              ;;
            *)
              echo "Public service returned unexpected HTTP status $status." >&2
              exit 1
              ;;
          esac

      - name: Clean up credentials
        if: always()
        shell: bash
        run: |
          rm -f ~/.ssh/social_deploy_key release-bundle.tar.gz
          docker logout ghcr.io >/dev/null 2>&1 || true
